# This is the wrangler.toml for the MildMate web rebuild project.
# It uses Cloudflare Pages, D1 Database, and R2 Storage.

name = "mildmate-new"
compatibility_date = "2024-04-29"
pages_build_output_dir = "public"

# D1 Database — product catalog, orders, abandoned carts, subscribers
[[d1_databases]]
binding = "DB"
database_name = "mildmate-db"
database_id = "85ce2f41-463a-43fa-8485-181e983b8fd4"

# R2 Bucket — product images, admin uploads
[[r2_buckets]]
binding = "MILDMATE_ASSETS"
bucket_name = "mildmate-assets"

# NOTE ON SECRETS:
# Stripe API keys (STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET)
# and MailChannels API keys are managed via the Cloudflare Dashboard or 
# the Wrangler CLI (e.g., `npx wrangler secret put STRIPE_SECRET_KEY`).
# They are NEVER stored in this file or the repository.
