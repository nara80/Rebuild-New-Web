  <!-- Phase 8: GTM (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KLJZZM9" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- ===== HEADER ===== -->
  <!-- __HEADER__ -->

  <main>

    <!-- ===== HERO ===== -->
    <section class="reviews-hero">
      <div class="reviews-hero-inner">
        <h1>รีวิวจากลูกค้า</h1>
        <p class="hero-sub">คำติชมจริงจากผู้ซื้อที่ได้รับการยืนยันทั่วโลก</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="reviews-status" style="color:var(--color-muted);margin-bottom:14px">กำลังโหลดรีวิว...</div>
        <div class="filter-bar" style="margin-top:0">
          <select id="reviews-filter-type">
            <option value="">ทุกหมวดหมู่</option>
            <option value="Marine & Yacht">Marine &amp; Yacht</option>
            <option value="Family & Co-Sleep">Family &amp; Co-Sleep</option>
            <option value="Deep Pocket">Deep Pocket</option>
            <option value="Boarding Dorm">Boarding Dorm</option>
            <option value="Pet Owner">Pet Owner</option>
            <option value="RV & Truck Cab">RV &amp; Truck Cab</option>
            <option value="Sheets">Sheets</option>
            <option value="Duvet Covers">Duvet Covers</option>
            <option value="Pillowcases">Pillowcases</option>
            <option value="Protections">Protections</option>
            <option value="Accessories">Accessories</option>
          </select>
          <select id="reviews-filter-rating">
            <option value="" selected>ทุกคะแนน</option>
            <option value="1">1+ ดาว</option>
            <option value="2">2+ ดาว</option>
            <option value="3">3+ ดาว</option>
            <option value="4">4+ ดาว</option>
            <option value="5">5 ดาว</option>
          </select>
          <button id="reviews-refresh-btn" class="btn btn-outline">รีเฟรช</button>
        </div>

        <div id="reviews-grid" class="reviews-grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px"></div>
        <div id="reviews-pagination" class="reviews-pagination" style="display:none">
          <button id="reviews-prev-page" class="btn btn-outline" type="button">ก่อนหน้า</button>
          <span id="reviews-page-info" class="reviews-page-info">หน้า 1 จาก 1</span>
          <button id="reviews-next-page" class="btn btn-outline" type="button">ถัดไป</button>
        </div>

        <div class="review-badge" style="margin-top:40px;">
          <div class="badge-box">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <div>
              <strong id="reviews-average">—</strong><br>
              <span class="small" id="reviews-count">อ้างอิงจากรีวิวของลูกค้าที่ได้รับการยืนยัน</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <!-- __FOOTER__ -->

  <script src="/js/nav.js"></script>
  <script src="/js/clerk.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/cookie-consent.js"></script>
  <script>
    (function () {
      var platformMap = {
        etsy: { label: "Etsy", logo: "/images/Logo/Etsy.png", type: "marketplace", href: "https://www.etsy.com/shop/mildmate" },
        ebay: { label: "eBay", logo: "/images/Logo/eBay.png", type: "marketplace", href: "https://www.ebay.com/str/mildmate" },
        amazon: { label: "Amazon", logo: "/images/Logo/Amazon.png", type: "marketplace" },
        shopee: { label: "Shopee", logo: "/images/Logo/Shopee.png", type: "marketplace", href: "https://shopee.co.th/neededshop_bt.2n.1y" },
        lazada: { label: "Lazada", logo: "/images/Logo/Lazada.png", type: "marketplace", href: "https://www.lazada.co.th/shop/needed-shop" },
        tiktok: { label: "TikTok", logo: "/images/Logo/TikTok.png", type: "marketplace", href: "https://www.tiktok.com/@bt.mildmate" },
        website: { label: "Website", logo: "/images/logo.png", type: "direct" },
        line: { label: "LINE", logo: "/images/Logo/LineOA.png", type: "direct" },
        lineoa: { label: "LINE", logo: "/images/Logo/LineOA.png", type: "direct" },
        whatsapp: { label: "WhatsApp", logo: "/images/Logo/WhatsAPP.png", type: "direct" },
        facebook: { label: "Facebook", logo: "/images/Logo/Facebook.png", type: "direct" },
        instagram: { label: "Instagram", logo: "/images/Logo/Instagram.png", type: "direct" }
      };

      function esc(s) {
        return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function stars(n) {
        var x = Math.max(1, Math.min(5, Number(n) || 5));
        return "★★★★★".slice(0, x) + "☆☆☆☆☆".slice(0, 5 - x);
      }

      function renderPlatform(platform) {
        var key = String(platform || "").toLowerCase();
        var info = platformMap[key] || { label: key || "Unknown", type: "direct" };
        var chip = '<span class="rv-platform">' + (info.logo ? '<img src="' + esc(info.logo) + '" alt="">' : "") + esc(info.label) + "</span>";
        if (info.type === "marketplace" && info.href) {
          return '<a href="' + esc(info.href) + '" target="_blank" rel="noopener noreferrer">' + chip + "</a>";
        }
        return chip;
      }

      function formatReviewDate(raw) {
        var v = String(raw || "").trim();
        var m = v.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (m) return m[1] + "-" + m[2] + "-" + m[3];
        var d = new Date(v);
        if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
        return "";
      }

      function getFallbackReviewPhoto(productType) {
        var key = String(productType || "").trim();
        var map = {
          "Marine & Yacht": "/images/products/marine-fitted-sheet/main.jpg",
          "Family & Co-Sleep": "/images/products/family-fitted-sheet/main.jpg",
          "Deep Pocket": "/r2/products/uploads/1781148534900-lsysxk.jpg",
          "Boarding Dorm": "/images/products/dorm-fitted-sheet/main.jpg",
          "Pet Owner": "/images/products/pet-owner-fitted-sheet/main.jpg",
          "RV & Truck Cab": "/images/products/rv-truck-fitted-sheet/main.jpg",
          "Sheets": "/images/products/standard-fitted-sheet/main.jpg",
          "Duvet Covers": "/images/products/3-sided-duvet/main.jpg",
          "Pillowcases": "/images/products/pillowcase-envelope/main.jpg",
          "Protections": "/images/products/mattress-protector-standard/main.jpg",
          "Accessories": "/images/products/bedbridge-connector/main.jpg"
        };
        return map[key] || "/images/products/standard-fitted-sheet/main.jpg";
      }

      function renderCard(rv) {
        var imgSrc = rv.image_url || getFallbackReviewPhoto(rv.product_type);
        var photo = '<div class="rv-photo"><img src="' + esc(imgSrc) + '" alt=""></div>';
        var platformBadge = renderPlatform(rv.platform);
        var verifiedHtml = rv.is_verified ? '<span class="rv-verified">ผู้ซื้อที่ได้รับการยืนยัน</span>' : '';
        var productTag = rv.product_type ? '<span class="rv-product-tag">' + esc(rv.product_type) + '</span>' : '';
        var dateText = formatReviewDate(rv.review_date || rv.created_at);
        return '<article class="review-card">' + photo + '<div class="rv-body"><div class="review-stars">' + stars(rv.rating) + ' ' + platformBadge + '</div><div class="rv-meta">' + verifiedHtml + productTag + '</div><p class="review-text">"' + esc(rv.review_text || "") + '"</p><p class="rv-author">— ' + esc(rv.customer_name || "ไม่ระบุชื่อ") + (rv.customer_country ? ", " + esc(rv.customer_country) : "") + (dateText ? " • " + esc(dateText) : "") + "</p></div></article>";
      }

      var paging = { page: 1, pageSize: 12, total: 0, totalPages: 1 };

      function refreshPager() {
        var pager = document.getElementById("reviews-pagination");
        var prevBtn = document.getElementById("reviews-prev-page");
        var nextBtn = document.getElementById("reviews-next-page");
        var info = document.getElementById("reviews-page-info");
        paging.totalPages = Math.max(1, Math.ceil((paging.total || 0) / paging.pageSize));
        if (paging.page > paging.totalPages) paging.page = paging.totalPages;
        pager.style.display = paging.total > paging.pageSize ? "flex" : "none";
        prevBtn.disabled = paging.page <= 1;
        nextBtn.disabled = paging.page >= paging.totalPages;
        info.textContent = "หน้า " + paging.page + " จาก " + paging.totalPages;
      }

      async function loadReviews(resetPage) {
        var grid = document.getElementById("reviews-grid");
        var status = document.getElementById("reviews-status");
        var avg = document.getElementById("reviews-average");
        var count = document.getElementById("reviews-count");
        if (resetPage) paging.page = 1;
        var minRating = document.getElementById("reviews-filter-rating").value || "";
        var type = document.getElementById("reviews-filter-type").value || "";
        var offset = (paging.page - 1) * paging.pageSize;
        status.textContent = "กำลังโหลดรีวิว...";
        var query = "/api/reviews?limit=" + paging.pageSize + "&offset=" + offset + "&sort=priority" + (minRating ? "&min_rating=" + encodeURIComponent(minRating) : "") + (type ? "&product_type=" + encodeURIComponent(type) : "") + "&_t=" + Date.now();
        try {
          var res = await fetch(query, { headers: { "Accept": "application/json" } });
          var data = await res.json();
          var list = Array.isArray(data.reviews) ? data.reviews : [];
          paging.total = Number(data.total || list.length || 0);
          if (!list.length && paging.page > 1 && paging.total > 0) {
            paging.page = Math.max(1, paging.page - 1);
            return loadReviews(false);
          }
          grid.innerHTML = list.length ? list.map(renderCard).join("") : '<p style="color:var(--color-muted);grid-column:1/-1;text-align:center">ไม่พบรีวิวสำหรับตัวกรองนี้</p>';
          var total = paging.total;
          var shownStart = total ? offset + 1 : 0;
          var shownEnd = offset + list.length;
          var ratingSum = list.reduce(function (acc, rv) { return acc + (Number(rv.rating) || 0); }, 0);
          var average = list.length ? (ratingSum / list.length).toFixed(1) : "—";
          avg.textContent = average === "—" ? "—" : average + " จาก 5 ดาว";
          count.textContent = total + " รีวิว";
          status.textContent = list.length ? ("กำลังแสดง " + shownStart + "–" + shownEnd + " จาก " + total + " รีวิว") : "ไม่พบรีวิวสำหรับตัวกรองนี้";
          refreshPager();
        } catch (e) {
          grid.innerHTML = '<p style="color:var(--c-red, #ef4444);grid-column:1/-1;text-align:center">ไม่สามารถโหลดรีวิวได้</p>';
          status.textContent = "ไม่สามารถโหลดรีวิวได้";
          paging.total = 0;
          refreshPager();
        }
      }

      document.getElementById("reviews-refresh-btn").addEventListener("click", function () { loadReviews(false); });
      document.getElementById("reviews-filter-type").addEventListener("change", function () { loadReviews(true); });
      document.getElementById("reviews-filter-rating").addEventListener("change", function () { loadReviews(true); });
      document.getElementById("reviews-prev-page").addEventListener("click", function () {
        if (paging.page <= 1) return;
        paging.page -= 1;
        loadReviews(false);
      });
      document.getElementById("reviews-next-page").addEventListener("click", function () {
        if (paging.page >= paging.totalPages) return;
        paging.page += 1;
        loadReviews(false);
      });
      loadReviews(true);
    })();
  </script>
</body>
</html>
